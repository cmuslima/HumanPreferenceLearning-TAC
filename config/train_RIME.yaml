defaults:
  - agent: sac_rime
    
# this needs to be specified manually
experiment: RIME
wandb: true
wandb_project: soft_tac
wandb_entity: musliman


# reward learning
segment: 50
activation: tanh
num_seed_steps: 1000
num_unsup_steps: 9000
num_interact: 20000
reward_lr: 0.0003
reward_batch: 100
reward_update: 50
least_reward_update: 5
feed_type: 0
reset_update: 100
topK: 5
ensemble_size: 3
max_feedback: 1000
large_batch: 10
label_margin: 0.0
teacher_beta: -1
teacher_gamma: 1.0
teacher_eps_mistake: 0.0
teacher_eps_skip: 0.0
teacher_eps_equal: 0.0
threshold_variance: kl
threshold_alpha: 0.5
threshold_beta_init: 3.0
threshold_beta_min: 1.0

# scheduling
reward_schedule: 0

num_train_steps: 500000
replay_buffer_capacity: ${num_train_steps}

# evaluation config
eval_frequency: 10000
num_eval_episodes: 10
device: cuda

# logger
log_frequency: 1000
log_save_tb: false

# video recorder
save_video: false
# setups
seed: 42
alpha: 1
# Environment
env: walker_walk
gradient_update: 1
env_suite: dmc # or metaworld
#user study params
user_study: 0
render_frames: 0
frame_size: [125, 200]
# hydra configuration
hydra:
  name: ${env}
  run:
    dir: ./exp/${experiment}/${env}/H${diag_gaussian_actor.params.hidden_dim}_L${diag_gaussian_actor.params.hidden_depth}_lr${agent.params.actor_lr}/teacher_b${teacher_beta}_g${teacher_gamma}_m${teacher_eps_mistake}_s${teacher_eps_skip}_e${teacher_eps_equal}/init${num_seed_steps}_unsup${num_unsup_steps}_inter${num_interact}_seg${segment}_act${activation}_Rlr${reward_lr}_Rupdate${reward_update}_en${ensemble_size}_sample${feed_type}_large_batch${large_batch}_schedule_${reward_schedule}_label_smooth_${label_margin}/${experiment}_maxfeed${max_feedback}_Rbatch${reward_batch}_seed${seed}