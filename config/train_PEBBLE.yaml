defaults:
    - agent: sac_pebble
    
experiment: PEBBLE
# wandb log (need to be specified manually)
wandb: true
wandb_project: PbRL_Human_Preferences_Benchmarking
wandb_entity: musliman

# reward learning
segment: 50
activation: tanh
num_seed_steps: 1000
num_unsup_steps: 9000
num_interact: 20000
reward_lr: 0.0003
reward_batch: 10
reward_update: 200
feed_type: 1
reset_update: 100
topK: 5
ensemble_size: 3
max_feedback: 100
large_batch: 10
label_margin: 0.0
teacher_beta: -1
teacher_gamma: 1
teacher_eps_mistake: 0
teacher_eps_skip: 0
teacher_eps_equal: 0

# scheduling
reward_schedule: 0
gradient_update: 1
num_train_steps: 1e6
replay_buffer_capacity: ${num_train_steps}

# evaluation config
eval_frequency: 10000
num_eval_episodes: 10
device: cuda


# setups
seed: 5


# environment
env: walker_walk
env_suite: dmc # or metaworld

#user study params
user_study: 0
render_frames: 0
frame_size: [125, 200]
# hydra configuration
hydra:
    name: ${env}
    run:
        dir: ./exp/${experiment}/${env}/maxFeedback${max_feedback}_numInteract${num_interact}_seed${seed}